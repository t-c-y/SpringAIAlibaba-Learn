server:
  port: 8093

spring:
  application:
    name: spring-ai-alibaba-rag-tuning-demo
  ai:
    retry:
      max-attempts: 2
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      read-timeout: ${DASHSCOPE_READ_TIMEOUT:120000}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen3.7-max}
          temperature: 0.2
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v2}
