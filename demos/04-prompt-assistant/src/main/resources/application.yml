server:
  port: 8083

spring:
  application:
    name: spring-ai-alibaba-prompt-assistant-demo
  ai:
    retry:
      max-attempts: 2
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      read-timeout: ${DASHSCOPE_READ_TIMEOUT:120000}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
          # 提示词工程阶段建议保持较低温度，让输出更贴近 System Prompt 的结构约束。
          temperature: 0.3
