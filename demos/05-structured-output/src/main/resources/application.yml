server:
  port: 8084

spring:
  application:
    name: spring-ai-alibaba-structured-output-demo
  ai:
    retry:
      max-attempts: 2
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      read-timeout: ${DASHSCOPE_READ_TIMEOUT:120000}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen3.7-max}
          # 结构化输出场景强烈建议低温度，避免模型自由发挥破坏 JSON 结构。
          temperature: 0.1
