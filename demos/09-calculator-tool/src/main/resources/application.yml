server:
  port: 8088

spring:
  application:
    name: spring-ai-alibaba-calculator-tool-demo
  ai:
    retry:
      max-attempts: 2
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      read-timeout: ${DASHSCOPE_READ_TIMEOUT:120000}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen3.7-plus}
          temperature: 0.1
