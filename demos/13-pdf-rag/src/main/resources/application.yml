server:
  port: 8092
  # PDF 可能较大，放开上传大小限制。
spring:
  application:
    name: spring-ai-alibaba-pdf-rag-demo
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  ai:
    retry:
      max-attempts: 2
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      read-timeout: ${DASHSCOPE_READ_TIMEOUT:120000}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
          temperature: 0.2
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v2}
